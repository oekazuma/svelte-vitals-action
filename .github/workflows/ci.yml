name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # A committed dist/ that no longer matches source would silently ship stale
      # behavior to every consumer pinned to this ref — fail the build instead.
      - name: Verify dist is up to date
        run: |
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "::error::dist/ is stale — run 'pnpm build' and commit the result."
            git status --porcelain -- dist
            exit 1
          fi
